name: Pages

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check core.js
          node --check extension/content-script.js
          node --check extension/service-worker.js

      - name: Run unit tests
        run: npm test

  deploy:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout stable source
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable-source

      - name: Checkout beta source
        uses: actions/checkout@v4
        with:
          ref: dev
          path: beta-source

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p site site/beta
          for file in index.html styles.css app.js core.js favicon.jpg LICENSE README.md; do
            cp "stable-source/$file" "site/$file"
            cp "beta-source/$file" "site/beta/$file"
          done
          cp stable-source/.nojekyll site/
          cp beta-source/.nojekyll site/beta/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
