<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <title>PiP カンペツール</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Local image deck / Document PiP</p>
        <h1>PiP カンペツール</h1>
      </div>
      <div class="header-actions">
        <span id="support-badge" class="support-badge">確認中</span>
        <button id="open-pip" class="primary-button" type="button">PiPで表示</button>
      </div>
    </header>

    <main class="app-shell">
      <section class="deck-panel" aria-label="カンペ管理">
        <div id="drop-zone" class="drop-zone" tabindex="0">
          <input id="file-input" type="file" accept="image/*" multiple hidden>
          <div>
            <strong>画像を追加</strong>
            <span>クリック、またはここへドロップ</span>
          </div>
          <button id="pick-files" class="secondary-button" type="button">選択</button>
        </div>

        <div class="settings-row">
          <label class="check-option">
            <input id="optimize-images" type="checkbox" checked>
            <span>保存時に長辺2048pxへ軽量化</span>
          </label>
        </div>

        <div class="list-header">
          <div>
            <h2>登録画像</h2>
            <p id="deck-meta">0 / 40</p>
          </div>
          <button id="clear-all" class="danger-button" type="button">全削除</button>
        </div>

        <div id="thumb-list" class="thumb-list" aria-live="polite"></div>
      </section>

      <section class="viewer-panel" aria-label="プレビュー">
        <div class="viewer-toolbar">
          <button id="prev-main" class="icon-button" type="button" aria-label="前の画像">←</button>
          <div class="current-info">
            <strong id="current-title">未登録</strong>
            <span id="current-count">0 / 0</span>
          </div>
          <button id="next-main" class="icon-button" type="button" aria-label="次の画像">→</button>
        </div>

        <div class="preview-stage">
          <div id="empty-state" class="empty-state">
            <strong>攻略中に見たい画像を登録してください</strong>
            <span>PiP小窓の左右ボタン、またはこの画面の←→で切り替えできます。</span>
          </div>
          <img id="preview-image" alt="">
        </div>

        <div class="viewer-options">
          <label>
            表示
            <select id="fit-mode">
              <option value="contain">全体を表示</option>
              <option value="cover">画面いっぱい</option>
            </select>
          </label>
          <label>
            PiPサイズ
            <select id="pip-size">
              <option value="480x270">480 x 270</option>
              <option value="640x360" selected>640 x 360</option>
              <option value="800x450">800 x 450</option>
              <option value="960x540">960 x 540</option>
            </select>
          </label>
        </div>

        <p id="status-line" class="status-line" role="status"></p>
      </section>
    </main>
  </body>
</html>
